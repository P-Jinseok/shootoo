<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>포트리스 2 리마스터 (Fortress II HTML5 Edition)</title>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css');

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            margin: 0;
            padding: 0;
        }

        body {
            background: #050b14;
            color: #f8fafc;
            font-family: 'Pretendard', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* ── 메인 캐비넷 프레임 ── */
        #gameCabinet {
            position: relative;
            width: 100vw;
            max-width: 1024px;
            aspect-ratio: 1024 / 576;
            background: #020617;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.95), 0 0 0 2px rgba(255, 255, 255, 0.1);
            overflow: hidden;
            border-radius: 12px;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        /* ── 상단 클래식 포트리스 레트로 HUD ── */
        #uiOverlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 10;
        }

        .hud-card {
            background: rgba(10, 15, 30, 0.85);
            backdrop-filter: blur(10px);
            border: 2px solid #334155;
            padding: 8px 14px;
            border-radius: 10px;
            width: 220px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            transition: all 0.3s ease;
        }

        .hud-card.active {
            border-color: #f59e0b;
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.4), inset 0 0 10px rgba(245, 158, 11, 0.2);
        }

        .hud-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .tank-label {
            font-weight: 800;
            font-size: 13px;
            letter-spacing: -0.3px;
            text-shadow: 1px 1px 2px #000;
        }

        .angle-badge {
            font-size: 11px;
            color: #fbbf24;
            background: rgba(0,0,0,0.6);
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 700;
            border: 1px solid rgba(251, 191, 36, 0.3);
        }

        .gauge-bar-bg {
            width: 100%;
            height: 10px;
            background: #0f172a;
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.15);
            position: relative;
        }

        .gauge-fill {
            height: 100%;
            width: 100%;
            transition: width 0.25s ease-out;
            border-radius: 4px;
        }

        /* 스키나 게이지 (이동력 게이지) */
        .move-gauge-wrapper {
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            color: #94a3b8;
            font-weight: 700;
        }

        .move-gauge-bg {
            flex-grow: 1;
            height: 5px;
            background: #0f172a;
            border-radius: 3px;
            overflow: hidden;
        }

        .move-gauge-fill {
            height: 100%;
            width: 100%;
            background: #38bdf8;
            transition: width 0.1s linear;
        }

        /* 중앙 나침반 및 바람 인디케이터 */
        #centerHUD {
            background: rgba(10, 15, 30, 0.9);
            backdrop-filter: blur(10px);
            border: 2px solid #334155;
            padding: 8px 18px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            min-width: 160px;
        }

        .wind-title {
            font-size: 11px;
            color: #94a3b8;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .wind-val-box {
            font-size: 16px;
            font-weight: 900;
            color: #38bdf8;
            margin: 2px 0;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        .turn-timer {
            font-size: 18px;
            font-weight: 900;
            color: #ef4444;
            text-shadow: 0 0 8px rgba(239, 68, 68, 0.6);
        }

        /* 하단 메인 슈팅 게이지 (포트리스2 스타일) */
        #bottomGaugePanel {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: 50%;
            max-width: 500px;
            background: rgba(15, 23, 42, 0.92);
            backdrop-filter: blur(12px);
            border: 2px solid #475569;
            padding: 8px 16px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            z-index: 10;
        }

        .power-bar-bg {
            width: 100%;
            height: 16px;
            background: #020617;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #64748b;
            position: relative;
        }

        .power-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #22c55e 0%, #eab308 60%, #ef4444 100%);
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.8);
        }

        /* ── 하단 모바일/터치 아케이드 패널 ── */
        #arcadePad {
            margin-top: 10px;
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: center;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            padding: 8px 16px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100vw;
            max-width: 1024px;
        }

        .pad-btn {
            background: linear-gradient(180deg, #334155 0%, #1e293b 100%);
            color: #f8fafc;
            border: 1px solid #475569;
            padding: 8px 14px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 12px;
            cursor: pointer;
            box-shadow: 0 4px 0 #0f172a;
            transition: all 0.05s ease;
        }

        .pad-btn:active, .pad-btn.pressed {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #0f172a;
            background: #0284c7;
            border-color: #38bdf8;
        }

        .fire-pad-btn {
            background: linear-gradient(180deg, #ef4444 0%, #dc2626 100%);
            box-shadow: 0 4px 0 #7f1d1d;
            border-color: #fca5a5;
            padding: 8px 24px;
        }

        .fire-pad-btn:active, .fire-pad-btn.pressed {
            box-shadow: 0 1px 0 #7f1d1d;
            background: #b91c1c;
        }

        /* 포탄 선택 토글 버튼 */
        .weapon-btn {
            background: #1e293b;
            border: 1px solid #64748b;
            color: #94a3b8;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
        }

        .weapon-btn.active {
            background: #d97706;
            color: #fff;
            border-color: #fef08a;
            box-shadow: 0 0 10px rgba(217, 119, 6, 0.6);
        }

        @media (max-width: 768px) {
            .hud-card { width: 130px; padding: 6px; }
            .tank-label { font-size: 11px; }
            #centerHUD { min-width: 100px; padding: 4px 10px; }
            #bottomGaugePanel { width: 70%; }
            .pad-btn { padding: 6px 10px; font-size: 10px; }
        }
    </style>
</head>
<body>

<div id="gameCabinet">
    <!-- 레트로 오버레이 HUD -->
    <div id="uiOverlay">
        <!-- Player 1 -->
        <div id="p1Card" class="hud-card active">
            <div class="hud-title-row">
                <span class="tank-label" style="color: #4ade80;">P1 · 탱크 (Tank)</span>
                <span class="angle-badge"><span id="p1Angle">45</span>°</span>
            </div>
            <div class="gauge-bar-bg">
                <div id="p1HpFill" class="gauge-fill" style="background: linear-gradient(90deg, #15803d, #4ade80); width: 100%;"></div>
            </div>
            <div class="move-gauge-wrapper">
                <span>MOVE</span>
                <div class="move-gauge-bg"><div id="p1MoveFill" class="move-gauge-fill"></div></div>
            </div>
        </div>

        <!-- Center HUD (Wind & Turn Timer) -->
        <div id="centerHUD">
            <div class="wind-title">WIND SPEED</div>
            <div id="windBox" class="wind-val-box">◀ 0</div>
            <div id="turnTimer" class="turn-timer">20</div>
        </div>

        <!-- Player 2 -->
        <div id="p2Card" class="hud-card">
            <div class="hud-title-row">
                <span class="tank-label" style="color: #f87171;">P2 · 캐논 (Cannon)</span>
                <span class="angle-badge"><span id="p2Angle">45</span>°</span>
            </div>
            <div class="gauge-bar-bg">
                <div id="p2HpFill" class="gauge-fill" style="background: linear-gradient(90deg, #b91c1c, #f87171); width: 100%;"></div>
            </div>
            <div class="move-gauge-wrapper">
                <span>MOVE</span>
                <div class="move-gauge-bg"><div id="p2MoveFill" class="move-gauge-fill"></div></div>
            </div>
        </div>
    </div>

    <!-- 메인 슈팅 파워 게이지 -->
    <div id="bottomGaugePanel">
        <div style="display: flex; justify-content: space-between; font-size: 10px; color: #cbd5e1; font-weight: 800; margin-bottom: 3px;">
            <span>FIRE POWER</span>
            <span>무기: <span id="weaponLabel" style="color: #f59e0b;">일반탄 (1탄)</span></span>
        </div>
        <div class="power-bar-bg">
            <div id="powerGauge" class="power-bar-fill"></div>
        </div>
    </div>

    <!-- 게임 메인 캔버스 (포트리스2 밸리 맵 1024x576) -->
    <canvas id="gameCanvas" width="1024" height="576"></canvas>
</div>

<!-- 아케이드 컨트롤 패널 -->
<div id="arcadePad">
    <div style="display: flex; gap: 4px;">
        <button class="pad-btn" id="btnLeft">◀ 이동</button>
        <button class="pad-btn" id="btnRight">이동 ▶</button>
    </div>
    <div style="width: 1px; height: 20px; background: rgba(255,255,255,0.15);"></div>
    <div style="display: flex; gap: 4px;">
        <button class="pad-btn" id="btnUp">▲ 각도</button>
        <button class="pad-btn" id="btnDown">각도 ▼</button>
    </div>
    <div style="width: 1px; height: 20px; background: rgba(255,255,255,0.15);"></div>
    <div style="display: flex; gap: 4px;">
        <button class="weapon-btn active" id="btnW1">1탄 (일반)</button>
        <button class="weapon-btn" id="btnW2">2탄 (특수)</button>
    </div>
    <div style="width: 1px; height: 20px; background: rgba(255,255,255,0.15);"></div>
    <button class="pad-btn fire-pad-btn" id="btnFire">🔥 발사 (SPACE)</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// 지형 비트맵 오프스크린 캔버스
const terrainCanvas = document.createElement('canvas');
terrainCanvas.width = canvas.width;
terrainCanvas.height = canvas.height;
const tCtx = terrainCanvas.getContext('2d');

// 글로벌 게임 엔진 상태
let currentTurn = 1; // 1: P1(Tank), 2: P2(Cannon)
let wind = Math.floor(Math.random() * 15) - 7; // -7 ~ +7
let isCharging = false;
let currentPower = 0;
let bullets = [];
let particles = [];
let gameOver = false;
let animFrame = 0;
let turnTimeLeft = 20;
let turnTimerInterval = null;

// 포트리스2 스펙에 맞춘 Tanks 설정
const players = [
    null,
    {
        id: 1, name: '탱크 (Tank)', type: 'TANK',
        x: 180, y: 0, hp: 100, maxHp: 100, angle: 45, weapon: 1,
        moveEnergy: 100, maxMoveEnergy: 100,
        color: '#22c55e', darkColor: '#14532d', recoil: 0
    },
    {
        id: 2, name: '캐논 (Cannon)', type: 'CANNON',
        x: 840, y: 0, hp: 100, maxHp: 100, angle: 45, weapon: 1,
        moveEnergy: 100, maxMoveEnergy: 100,
        color: '#ef4444', darkColor: '#7f1d1d', recoil: 0
    }
];

const keys = {};

// 키보드 컨트롤
window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'Digit1') setWeapon(1);
    if (e.code === 'Digit2') setWeapon(2);
    if (e.code === 'Space' && bullets.length === 0 && !isCharging && !gameOver) {
        startCharging();
    }
});

window.addEventListener('keyup', e => {
    keys[e.code] = false;
    if (e.code === 'Space' && isCharging) {
        stopCharging();
    }
});

// 패드 버튼 연동
function bindBtn(id, code) {
    const el = document.getElementById(id);
    const press = () => {
        keys[code] = true;
        el.classList.add('pressed');
        if (id === 'btnFire' && bullets.length === 0 && !isCharging && !gameOver) startCharging();
    };
    const release = () => {
        keys[code] = false;
        el.classList.remove('pressed');
        if (id === 'btnFire' && isCharging) stopCharging();
    };
    el.addEventListener('mousedown', press);
    el.addEventListener('mouseup', release);
    el.addEventListener('mouseleave', release);
    el.addEventListener('touchstart', (e) => { e.preventDefault(); press(); });
    el.addEventListener('touchend', (e) => { e.preventDefault(); release(); });
}

bindBtn('btnLeft', 'KeyA');
bindBtn('btnRight', 'KeyD');
bindBtn('btnUp', 'KeyW');
bindBtn('btnDown', 'KeyS');
bindBtn('btnFire', 'Space');

document.getElementById('btnW1').onclick = () => setWeapon(1);
document.getElementById('btnW2').onclick = () => setWeapon(2);

function setWeapon(num) {
    players[currentTurn].weapon = num;
    document.getElementById('btnW1').classList.toggle('active', num === 1);
    document.getElementById('btnW2').classList.toggle('active', num === 2);
    document.getElementById('weaponLabel').innerText = num === 1 ? '일반탄 (1탄)' : '특수탄 (2탄)';
}

function startCharging() {
    isCharging = true;
    currentPower = 0;
}

function stopCharging() {
    isCharging = false;
    fireWeapon();
}

/* ── 1. 클래식 '밸리(Valley)' 맵 지형 생성 ── */
function initValleyMap() {
    tCtx.clearRect(0, 0, canvas.width, canvas.height);
    
    // 암석/흙 레이어
    tCtx.fillStyle = '#64748b';
    tCtx.beginPath();
    tCtx.moveTo(0, canvas.height);

    // 포트리스2 밸리 맵 독특한 V자 및 언덕 곡선
    for (let x = 0; x <= canvas.width; x++) {
        let y = 380 + Math.sin(x * 0.005) * 60 + Math.cos(x * 0.012) * 40;
        // 중앙 계곡 골짜기 형성
        if (x > 380 && x < 640) {
            y += Math.sin((x - 380) / 260 * Math.PI) * 70;
        }
        tCtx.lineTo(x, y);
    }
    tCtx.lineTo(canvas.width, canvas.height);
    tCtx.fill();

    // 상단 푸른 잔디 레이어
    tCtx.strokeStyle = '#22c55e';
    tCtx.lineWidth = 12;
    tCtx.stroke();

    tCtx.strokeStyle = '#15803d';
    tCtx.lineWidth = 4;
    tCtx.stroke();
}

function getTerrainY(x) {
    if (x < 0 || x >= canvas.width) return canvas.height;
    const imgData = tCtx.getImageData(Math.floor(x), 0, 1, canvas.height).data;
    for (let y = 0; y < canvas.height; y++) {
        if (imgData[y * 4 + 3] > 0) return y;
    }
    return canvas.height;
}

function destroyTerrain(cx, cy, radius) {
    tCtx.globalCompositeOperation = 'destination-out';
    tCtx.beginPath();
    tCtx.arc(cx, cy, radius, 0, Math.PI * 2);
    tCtx.fill();
    tCtx.globalCompositeOperation = 'source-over';
}

/* ── 2. 배경 (하늘, 구름, 먼 산) 렌더링 ── */
function drawBackground() {
    // 밸리 맵 특유의 맑은 하늘 그라데이션
    let skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
    skyGrad.addColorStop(0, '#0284c7');
    skyGrad.addColorStop(0.6, '#38bdf8');
    skyGrad.addColorStop(1, '#bae6fd');
    ctx.fillStyle = skyGrad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 먼 산 (원경)
    ctx.fillStyle = 'rgba(71, 85, 105, 0.4)';
    ctx.beginPath();
    ctx.moveTo(0, canvas.height);
    for (let x = 0; x <= canvas.width; x += 20) {
        ctx.lineTo(x, 240 + Math.sin(x * 0.003) * 80);
    }
    ctx.lineTo(canvas.width, canvas.height);
    ctx.fill();

    // 흐르는 입체 구름
    ctx.fillStyle = 'rgba(255, 255, 255, 0.75)';
    const cloudPositions = [
        { x: (100 + animFrame * 0.2) % (canvas.width + 100) - 50, y: 70, s: 1 },
        { x: (500 + animFrame * 0.15) % (canvas.width + 100) - 50, y: 110, s: 1.3 },
        { x: (850 + animFrame * 0.25) % (canvas.width + 100) - 50, y: 80, s: 0.9 }
    ];
    cloudPositions.forEach(c => {
        ctx.beginPath();
        ctx.arc(c.x, c.y, 25 * c.s, 0, Math.PI * 2);
        ctx.arc(c.x + 20 * c.s, c.y - 12 * c.s, 20 * c.s, 0, Math.PI * 2);
        ctx.arc(c.x + 40 * c.s, c.y, 22 * c.s, 0, Math.PI * 2);
        ctx.fill();
    });
}

/* ── 3. 도트/일러스트 스타일 클래식 포트리스2 탱크 렌더링 ── */
function drawTank(p) {
    ctx.save();
    ctx.translate(p.x, p.y);

    let isP2 = (p.id === 2);
    if (isP2) ctx.scale(-1, 1); // P2 좌우 반전

    const rad = p.angle * Math.PI / 180;
    const recoil = p.recoil || 0;

    if (p.type === 'TANK') {
        // [클래식 탱크 - 정통 바디]
        // 캐터필러 바퀴
        ctx.fillStyle = '#1e293b';
        ctx.beginPath();
        ctx.roundRect(-20, -3, 40, 11, 5);
        ctx.fill();
        ctx.strokeStyle = '#475569';
        ctx.lineWidth = 1.5;
        ctx.stroke();

        // 바퀴 휠 회전
        ctx.fillStyle = '#94a3b8';
        for(let wx = -12; wx <= 12; wx += 8) {
            ctx.beginPath();
            ctx.arc(wx, 2, 2.5, 0, Math.PI * 2);
            ctx.fill();
        }

        // 탱크 메인 그린 바디
        ctx.fillStyle = '#22c55e';
        ctx.beginPath();
        ctx.moveTo(-16, -4);
        ctx.lineTo(-12, -16);
        ctx.lineTo(12, -16);
        ctx.lineTo(16, -4);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = '#14532d';
        ctx.lineWidth = 2;
        ctx.stroke();

        // 포신
        const bLen = 28 - recoil;
        ctx.strokeStyle = '#334155';
        ctx.lineWidth = 7;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(0, -11);
        ctx.lineTo(Math.cos(rad) * bLen, -11 - Math.sin(rad) * bLen);
        ctx.stroke();

    } else {
        // [캐논 탱크 - 포트리스2 시그니처 붉은 캐논]
        // 슬림 타이어
        ctx.fillStyle = '#0f172a';
        ctx.beginPath();
        ctx.roundRect(-18, -2, 36, 10, 4);
        ctx.fill();

        // 캐논 붉은 돔 차체
        ctx.fillStyle = '#ef4444';
        ctx.beginPath();
        ctx.arc(0, -5, 14, Math.PI, 0);
        ctx.fill();
        ctx.strokeStyle = '#7f1d1d';
        ctx.lineWidth = 2;
        ctx.stroke();

        // 노란 해치
        ctx.fillStyle = '#fef08a';
        ctx.beginPath();
        ctx.arc(0, -7, 3, 0, Math.PI * 2);
        ctx.fill();

        // 롱 캐논 포신
        const bLen = 34 - recoil;
        ctx.strokeStyle = '#1e293b';
        ctx.lineWidth = 5;
        ctx.lineCap = 'square';
        ctx.beginPath();
        ctx.moveTo(0, -5);
        ctx.lineTo(Math.cos(rad) * bLen, -5 - Math.sin(rad) * bLen);
        ctx.stroke();
    }

    // 포탄 조준점 보조 가이드라인
    if (players[currentTurn] === p && !bullets.length) {
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([3, 3]);
        ctx.beginPath();
        ctx.moveTo(0, -10);
        ctx.lineTo(Math.cos(rad) * 50, -10 - Math.sin(rad) * 50);
        ctx.stroke();
        ctx.setLineDash([]);
    }

    ctx.restore();
}

/* ── 4. 게임 물리 연산 및 업데이트 ── */
function updateGame() {
    animFrame++;

    // 탱크 중력 적용
    players.slice(1).forEach(p => {
        const groundY = getTerrainY(p.x);
        if (p.y < groundY) p.y += 3;
        else p.y = groundY;

        if (p.recoil > 0) p.recoil -= 0.5;
    });

    if (bullets.length > 0 || gameOver) return;

    const cur = players[currentTurn];

    // 이동 (A/D) & 스키나(이동력) 게이지 차감
    if (keys['KeyA'] && cur.x > 25 && cur.moveEnergy > 0) {
        cur.x -= 1.2;
        cur.moveEnergy = Math.max(0, cur.moveEnergy - 0.4);
    }
    if (keys['KeyD'] && cur.x < canvas.width - 25 && cur.moveEnergy > 0) {
        cur.x += 1.2;
        cur.moveEnergy = Math.max(0, cur.moveEnergy - 0.4);
    }

    // 각도 조절 (W/S) - 0~90도 직관적 통일
    if (keys['KeyW']) cur.angle = Math.min(cur.angle + 0.8, 90);
    if (keys['KeyS']) cur.angle = Math.max(cur.angle - 0.8, 0);

    // 파워 차징 (속도 조절 적용)
    if (isCharging) {
        currentPower = Math.min(currentPower + 0.85, 100);
    }
}

/* ── 5. 포트리스2 발사 시스템 (3연사 캐논탄 구현) ── */
function fireWeapon() {
    const p = players[currentTurn];
    const actualAngleRad = (p.id === 2 ? (180 - p.angle) : p.angle) * Math.PI / 180;
    const speed = currentPower * 0.26;
    const barrelLen = p.type === 'TANK' ? 28 : 34;

    p.recoil = 8;

    // 탱크 2탄 = 3연사 미사일 (포트리스2 특수탄)
    if (p.weapon === 2 && p.type === 'TANK') {
        for (let i = 0; i < 3; i++) {
            setTimeout(() => {
                bullets.push({
                    shooterId: p.id, age: 0, type: 'MULTI',
                    x: p.x + Math.cos(actualAngleRad) * barrelLen,
                    y: p.y - 10 - Math.sin(actualAngleRad) * barrelLen,
                    vx: Math.cos(actualAngleRad) * (speed * (1 + (i - 1) * 0.04)),
                    vy: -Math.sin(actualAngleRad) * (speed * (1 + (i - 1) * 0.04)),
                    radius: 4
                });
            }, i * 150);
        }
    } else {
        // 일반 1탄 또는 캐논 빨간포탄
        bullets.push({
            shooterId: p.id, age: 0, type: p.weapon === 2 ? 'CANNON_RED' : 'NORMAL',
            x: p.x + Math.cos(actualAngleRad) * barrelLen,
            y: p.y - 10 - Math.sin(actualAngleRad) * barrelLen,
            vx: Math.cos(actualAngleRad) * speed,
            vy: -Math.sin(actualAngleRad) * speed,
            radius: p.weapon === 2 ? 6 : 4
        });
    }
}

/* ── 6. 포탄 탄도학 및 충돌 판정 ── */
function updateBullets() {
    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.age++;
        b.vx += wind * 0.0015; // 바람 영향을 받는 가속도
        b.vy += 0.14;          // 중력 가속도

        b.x += b.vx;
        b.y += b.vy;

        // 포탄 연기 이펙트
        particles.push({
            x: b.x, y: b.y, radius: Math.random() * 2.5 + 1.5,
            alpha: 0.7, color: b.type === 'CANNON_RED' ? '#ef4444' : '#cbd5e1'
        });

        // 화면 이탈
        if (b.x < 0 || b.x > canvas.width || b.y > canvas.height) {
            bullets.splice(i, 1);
            if (bullets.length === 0) endTurn();
            continue;
        }

        // 지형 충돌 검사
        const terrainY = getTerrainY(b.x);
        if (b.y >= terrainY) {
            explode(b.x, b.y, b.type);
            bullets.splice(i, 1);
            if (bullets.length === 0) endTurn();
            continue;
        }

        // 탱크 충돌 검사
        let hit = false;
        players.slice(1).forEach(p => {
            if (b.shooterId === p.id && b.age < 10) return; // 자가 충돌 방지

            const dist = Math.hypot(p.x - b.x, (p.y - 8) - b.y);
            if (dist < 18 + b.radius) {
                hit = true;
            }
        });

        if (hit) {
            explode(b.x, b.y, b.type);
            bullets.splice(i, 1);
            if (bullets.length === 0) endTurn();
        }
    }
}

/* ── 7. 폭발 및 데미지 연산 ── */
function explode(x, y, bulletType) {
    const explosionRadius = bulletType === 'CANNON_RED' ? 42 : (bulletType === 'MULTI' ? 24 : 32);
    destroyTerrain(x, y, explosionRadius);

    // 화려한 화염 파티클
    for (let i = 0; i < 30; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 5 + 1;
        particles.push({
            x: x, y: y,
            vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
            radius: Math.random() * 5 + 2, alpha: 1,
            color: ['#f97316', '#eab308', '#ef4444', '#ffffff'][Math.floor(Math.random() * 4)]
        });
    }

    // 피격 데미지
    players.slice(1).forEach(p => {
        const dist = Math.hypot(p.x - x, p.y - y);
        if (dist < explosionRadius + 18) {
            const baseDmg = bulletType === 'CANNON_RED' ? 45 : (bulletType === 'MULTI' ? 22 : 36);
            const dmg = Math.floor((1 - dist / (explosionRadius + 18)) * baseDmg);
            p.hp = Math.max(0, p.hp - dmg);
        }
    });
}

function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        if (p.vx) p.x += p.vx;
        if (p.vy) p.y += p.vy;
        p.alpha -= 0.03;
        if (p.alpha <= 0) particles.splice(i, 1);
    }
}

/* ── 8. 턴 관리 및 20초 타이머 ── */
function startTurnTimer() {
    clearInterval(turnTimerInterval);
    turnTimeLeft = 20;
    document.getElementById('turnTimer').innerText = turnTimeLeft;

    turnTimerInterval = setInterval(() => {
        if (bullets.length === 0 && !isCharging && !gameOver) {
            turnTimeLeft--;
            document.getElementById('turnTimer').innerText = turnTimeLeft;
            if (turnTimeLeft <= 0) {
                endTurn();
            }
        }
    }, 1000);
}

function endTurn() {
    currentPower = 0;

    if (players[1].hp <= 0 || players[2].hp <= 0) {
        gameOver = true;
        clearInterval(turnTimerInterval);
        return;
    }

    currentTurn = currentTurn === 1 ? 2 : 1;
    wind = Math.floor(Math.random() * 15) - 7; // 바람 새로 세팅
    players[currentTurn].moveEnergy = 100;    // 이동 게이지 회복
    setWeapon(players[currentTurn].weapon);

    // HUD 액티브 전환
    document.getElementById('p1Card').classList.toggle('active', currentTurn === 1);
    document.getElementById('p2Card').classList.toggle('active', currentTurn === 2);

    startTurnTimer();
}

/* ── 9. 메인 렌더링 루프 ── */
function render() {
    drawBackground();
    ctx.drawImage(terrainCanvas, 0, 0);

    // 파티클
    particles.forEach(p => {
        ctx.save();
        ctx.globalAlpha = Math.max(0, p.alpha);
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
    });

    // 탱크
    players.slice(1).forEach(p => {
        if (p.hp > 0) drawTank(p);
    });

    // 포탄
    bullets.forEach(b => {
        ctx.fillStyle = b.type === 'CANNON_RED' ? '#ef4444' : '#fbbf24';
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1.5;
        ctx.stroke();
    });

    // UI 정보 실시간 동기화
    document.getElementById('p1Angle').innerText = Math.round(players[1].angle);
    document.getElementById('p2Angle').innerText = Math.round(players[2].angle);
    document.getElementById('p1HpFill').style.width = (players[1].hp / players[1].maxHp * 100) + '%';
    document.getElementById('p2HpFill').style.width = (players[2].hp / players[2].maxHp * 100) + '%';
    document.getElementById('p1MoveFill').style.width = players[1].moveEnergy + '%';
    document.getElementById('p2MoveFill').style.width = players[2].moveEnergy + '%';

    document.getElementById('windBox').innerText = wind > 0 ? `▶ ${wind}` : (wind < 0 ? `◀ ${Math.abs(wind)}` : '0');
    document.getElementById('powerGauge').style.width = currentPower + '%';

    // 게임 오버 오버레이
    if (gameOver) {
        ctx.fillStyle = 'rgba(2, 6, 23, 0.88)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = '#f8fafc';
        ctx.font = '900 42px Pretendard, sans-serif';
        ctx.textAlign = 'center';
        const winner = players[1].hp > 0 ? 'P1 (탱크)' : 'P2 (캐논)';
        ctx.fillText(`🏆 ${winner} VICTORY!`, canvas.width / 2, canvas.height / 2 - 10);

        ctx.font = '16px Pretendard, sans-serif';
        ctx.fillStyle = '#f59e0b';
        ctx.fillText('F5 키를 눌러 다시 겨뤄보세요', canvas.width / 2, canvas.height / 2 + 30);
    }
}

function loop() {
    updateGame();
    updateBullets();
    updateParticles();
    render();
    requestAnimationFrame(loop);
}

// 최초 실행
initValleyMap();
startTurnTimer();
loop();
</script>
