<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>포트리스 2 - 모바일 터치 완벽 대응</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            touch-action: none; /* 브라우저 기본 제스처/스크롤 완벽 차단 */
            margin: 0;
            padding: 0;
        }

        body {
            background: #090d16;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            overflow: hidden;
            padding: 4px;
        }

        /* ── 로비 ── */
        #lobby {
            background: #1e293b;
            padding: 16px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            border: 2px solid #475569;
            z-index: 100;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .opt-btn {
            background: #334155;
            color: #fff;
            border: 1px solid #64748b;
            padding: 8px 12px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 12px;
            touch-action: manipulation;
        }

        .opt-btn.active {
            background: #0284c7;
            border-color: #38bdf8;
        }

        .start-btn {
            background: #ef4444;
            color: #fff;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            margin-top: 8px;
            touch-action: manipulation;
        }

        /* ── 게임 메인 ── */
        #gameArea {
            display: none;
            position: relative;
            width: 100vw;
            max-width: 960px;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #hud {
            position: absolute;
            top: 8px;
            left: 8px;
            right: 8px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        .hud-box {
            background: rgba(0, 0, 0, 0.5);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
        }

        /* ── 모바일 터치 아케이드 패널 ── */
        #pad {
            display: none;
            margin-top: 8px;
            gap: 6px;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-width: 960px;
            z-index: 50;
        }

        .pad-btn {
            background: #334155;
            color: #fff;
            border: 1px solid #64748b;
            padding: 10px 14px;
            font-size: 13px;
            font-weight: bold;
            border-radius: 8px;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        .pad-btn:active, .pad-btn.pressed {
            background: #0284c7;
            transform: scale(0.95);
        }

        .fire-btn {
            background: #dc2626;
            border-color: #f87171;
            padding: 10px 20px;
        }

        .fire-btn:active, .fire-btn.pressed {
            background: #991b1b;
        }
    </style>
</head>
<body>

<!-- 로비 -->
<div id="lobby">
    <h2 style="font-size: 18px; color: #f59e0b;">🎮 포트리스 2 설정</h2>
    <div>
        <p style="font-size: 12px; margin-bottom: 4px; color: #94a3b8;">1P 탱크</p>
        <div class="btn-group" id="p1Group">
            <button type="button" class="opt-btn active" data-val="CATAPULT">인민탱크</button>
            <button type="button" class="opt-btn" data-val="CANNON">캐논</button>
            <button type="button" class="opt-btn" data-val="MISSILE">유도탱크</button>
        </div>
    </div>
    <div>
        <p style="font-size: 12px; margin-bottom: 4px; color: #94a3b8;">2P 탱크</p>
        <div class="btn-group" id="p2Group">
            <button type="button" class="opt-btn" data-val="CATAPULT">인민탱크</button>
            <button type="button" class="opt-btn active" data-val="CANNON">캐논</button>
            <button type="button" class="opt-btn" data-val="MISSILE">유도탱크</button>
        </div>
    </div>
    <div>
        <p style="font-size: 12px; margin-bottom: 4px; color: #94a3b8;">전장 맵</p>
        <div class="btn-group" id="mapGroup">
            <button type="button" class="opt-btn active" data-val="VALLEY">밸리 계곡</button>
            <button type="button" class="opt-btn" data-val="SKY">공중 섬</button>
        </div>
    </div>
    <button type="button" class="start-btn" id="btnStart">게임 시작 🔥</button>
</div>

<!-- 게임 화면 -->
<div id="gameArea">
    <div id="hud">
        <div class="hud-box" id="p1Hud" style="color:#4ade80;">P1 HP: 100</div>
        <div class="hud-box" id="centerHud" style="color:#38bdf8;">턴: P1 | 바람: 0</div>
        <div class="hud-box" id="p2Hud" style="color:#f87171;">P2 HP: 100</div>
    </div>
    <canvas id="cvs" width="960" height="540"></canvas>
</div>

<!-- 조작 패널 -->
<div id="pad">
    <button type="button" class="pad-btn" id="mLeft">◀ 이동</button>
    <button type="button" class="pad-btn" id="mRight">이동 ▶</button>
    <button type="button" class="pad-btn" id="mUp">각도 ▲</button>
    <button type="button" class="pad-btn" id="mDown">각도 ▼</button>
    <button type="button" class="pad-btn" id="mWep">1탄</button>
    <button type="button" class="pad-btn fire-btn" id="mFire">🔥 FIRE</button>
</div>

<script>
const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');

let p1Type = 'CATAPULT', p2Type = 'CANNON', mapType = 'VALLEY';
let currentTurn = 1;
let wind = 0;
let isCharging = false;
let power = 0;
let bullet = null;
let gameOver = false;

const inputs = { left: false, right: false, up: false, down: false };

function getGroundY(x) {
    if (mapType === 'SKY' && (x < 100 || x > 860)) return null;
    let base = 380;
    if (mapType === 'VALLEY') {
        base = 380 + Math.sin(x * 0.008) * 40;
        if (x > 350 && x < 610) base += Math.sin((x - 350) / 260 * Math.PI) * 50;
    } else {
        base = 350 + Math.sin(x * 0.01) * 30;
    }
    return base;
}

class Tank {
    constructor(id, type, x, color) {
        this.id = id;
        this.type = type;
        this.x = x;
        this.y = getGroundY(x) || 380;
        this.color = color;
        this.hp = 100;
        this.angle = 45;
        this.wep = 1;
        this.isFallen = false;
    }

    update() {
        if (this.isFallen) return;
        const gY = getGroundY(this.x);
        if (gY === null) {
            this.y += 6;
            if (this.y > 600) { this.hp = 0; this.isFallen = true; }
        } else {
            this.y = gY;
        }
    }

    draw() {
        if (this.isFallen) return;
        ctx.save();
        ctx.translate(this.x, this.y);
        if (this.id === 2) ctx.scale(-1, 1);

        ctx.fillStyle = this.color;
        ctx.fillRect(-16, -12, 32, 12);
        ctx.fillStyle = '#0f172a';
        ctx.fillRect(-18, -2, 36, 6);

        const rad = this.angle * Math.PI / 180;
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.moveTo(0, -8);
        ctx.lineTo(Math.cos(rad) * 25, -8 - Math.sin(rad) * 25);
        ctx.stroke();

        ctx.restore();
    }
}

let p1, p2;

// 💡 모바일 터치/클릭 반응을 100% 보장하는 만능 바인딩 함수
function attachTouchClick(el, onStart, onEnd) {
    if (!el) return;

    let isTouched = false;

    // 터치 이벤트
    el.addEventListener('touchstart', (e) => {
        e.preventDefault();
        isTouched = true;
        el.classList.add('pressed');
        if (onStart) onStart();
    }, { passive: false });

    el.addEventListener('touchend', (e) => {
        e.preventDefault();
        el.classList.remove('pressed');
        if (onEnd) onEnd();
        setTimeout(() => { isTouched = false; }, 300);
    }, { passive: false });

    // 마우스 이벤트 (PC 겸용)
    el.addEventListener('mousedown', (e) => {
        if (isTouched) return;
        el.classList.add('pressed');
        if (onStart) onStart();
    });

    el.addEventListener('mouseup', (e) => {
        if (isTouched) return;
        el.classList.remove('pressed');
        if (onEnd) onEnd();
    });

    el.addEventListener('mouseleave', (e) => {
        el.classList.remove('pressed');
        if (onEnd && !isTouched) onEnd();
    });
}

// 로비 버튼 세팅
function setupLobbyBtn(groupId, callback) {
    const btns = document.querySelectorAll(`#${groupId} .opt-btn`);
    btns.forEach(b => {
        attachTouchClick(b, () => {
            btns.forEach(x => x.classList.remove('active'));
            b.classList.add('active');
            callback(b.dataset.val);
        }, null);
    });
}

setupLobbyBtn('p1Group', val => p1Type = val);
setupLobbyBtn('p2Group', val => p2Type = val);
setupLobbyBtn('mapGroup', val => mapType = val);

// 게임 시작 버튼
attachTouchClick(document.getElementById('btnStart'), () => {
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('gameArea').style.display = 'block';
    document.getElementById('pad').style.display = 'flex';

    p1 = new Tank(1, p1Type, 200, '#22c55e');
    p2 = new Tank(2, p2Type, 760, '#ef4444');
    wind = Math.floor(Math.random() * 11) - 5;
}, null);

// 방향 조작 바인딩
attachTouchClick(document.getElementById('mLeft'), () => inputs.left = true, () => inputs.left = false);
attachTouchClick(document.getElementById('mRight'), () => inputs.right = true, () => inputs.right = false);
attachTouchClick(document.getElementById('mUp'), () => inputs.up = true, () => inputs.up = false);
attachTouchClick(document.getElementById('mDown'), () => inputs.down = true, () => inputs.down = false);

// 무기 전환
attachTouchClick(document.getElementById('mWep'), () => {
    const cur = currentTurn === 1 ? p1 : p2;
    cur.wep = cur.wep === 1 ? 2 : 1;
    document.getElementById('mWep').innerText = `${cur.wep}탄`;
}, null);

// 발사 버튼
attachTouchClick(document.getElementById('mFire'), () => {
    if (!bullet && !isCharging && !gameOver) {
        isCharging = true;
        power = 0;
    }
}, () => {
    if (isCharging) {
        isCharging = false;
        shoot();
    }
});

// 키보드 지원 (PC 테스트용)
window.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') inputs.left = true;
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') inputs.right = true;
    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') inputs.up = true;
    if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') inputs.down = true;

    if (e.key === ' ' && !bullet && !isCharging && !gameOver) {
        isCharging = true; power = 0;
    }
});

window.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') inputs.left = false;
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') inputs.right = false;
    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') inputs.up = false;
    if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') inputs.down = false;

    if (e.key === ' ' && isCharging) {
        isCharging = false; shoot();
    }
});

function shoot() {
    const cur = currentTurn === 1 ? p1 : p2;
    const rad = (cur.id === 2 ? (180 - cur.angle) : cur.angle) * Math.PI / 180;
    const spd = power * 0.22;

    bullet = {
        shooter: cur.id,
        x: cur.x + Math.cos(rad) * 25,
        y: cur.y - 8 - Math.sin(rad) * 25,
        vx: Math.cos(rad) * spd,
        vy: -Math.sin(rad) * spd,
        type: cur.type,
        wep: cur.wep
    };
}

function update() {
    if (!p1) return;

    p1.update();
    p2.update();

    if (!bullet && !gameOver) {
        const cur = currentTurn === 1 ? p1 : p2;
        if (inputs.left) cur.x = Math.max(50, cur.x - 2);
        if (inputs.right) cur.x = Math.min(910, cur.x + 2);
        if (inputs.up) cur.angle = Math.min(90, cur.angle + 1);
        if (inputs.down) cur.angle = Math.max(0, cur.angle - 1);

        if (isCharging) {
            power = Math.min(100, power + 1.2);
        }
    }

    if (bullet) {
        const enemy = bullet.shooter === 1 ? p2 : p1;

        if (bullet.type === 'MISSILE' && bullet.wep === 2 && !enemy.isFallen) {
            const dist = Math.hypot(enemy.x - bullet.x, (enemy.y - 8) - bullet.y);
            if (dist < 200) {
                const angle = Math.atan2((enemy.y - 8) - bullet.y, enemy.x - bullet.x);
                const spd = Math.hypot(bullet.vx, bullet.vy);
                bullet.vx = bullet.vx * 0.85 + Math.cos(angle) * spd * 0.15;
                bullet.vy = bullet.vy * 0.85 + Math.sin(angle) * spd * 0.15;
            } else {
                bullet.vx += wind * 0.001; bullet.vy += 0.15;
            }
        } else {
            bullet.vx += wind * 0.0015;
            bullet.vy += 0.15;
        }

        bullet.x += bullet.vx;
        bullet.y += bullet.vy;

        const gY = getGroundY(bullet.x);
        let hit = false;

        if (gY !== null && bullet.y >= gY) hit = true;
        if (bullet.x < 0 || bullet.x > 960 || bullet.y > 540) hit = true;

        [p1, p2].forEach(p => {
            if (p.id !== bullet.shooter && !p.isFallen) {
                if (Math.hypot(p.x - bullet.x, (p.y - 8) - bullet.y) < 20) hit = true;
            }
        });

        if (hit) {
            [p1, p2].forEach(p => {
                const d = Math.hypot(p.x - bullet.x, p.y - bullet.y);
                if (d < 40) {
                    const dmg = Math.floor((1 - d / 40) * (bullet.wep === 2 ? 45 : 30));
                    p.hp = Math.max(0, p.hp - dmg);
                }
            });

            bullet = null;
            power = 0;

            if (p1.hp <= 0 || p2.hp <= 0 || p1.isFallen || p2.isFallen) {
                gameOver = true;
            } else {
                currentTurn = currentTurn === 1 ? 2 : 1;
                wind = Math.floor(Math.random() * 11) - 5;
            }
        }
    }

    document.getElementById('p1Hud').innerText = `P1 HP: ${p1.hp} | 각도: ${p1.angle}°`;
    document.getElementById('p2Hud').innerText = `P2 HP: ${p2.hp} | 각도: ${p2.angle}°`;
    document.getElementById('centerHud').innerText = `턴: P${currentTurn} | 바람: ${wind} | 파워: ${Math.floor(power)}%`;
}

function render() {
    ctx.fillStyle = '#0284c7';
    ctx.fillRect(0, 0, cvs.width, cvs.height);

    ctx.fillStyle = '#475569';
    ctx.beginPath();
    ctx.moveTo(0, cvs.height);
    for (let x = 0; x <= cvs.width; x += 5) {
        const y = getGroundY(x);
        if (y !== null) ctx.lineTo(x, y);
    }
    ctx.lineTo(cvs.width, cvs.height);
    ctx.fill();

    if (p1) {
        p1.draw();
        p2.draw();
    }

    if (bullet) {
        ctx.fillStyle = '#f59e0b';
        ctx.beginPath();
        ctx.arc(bullet.x, bullet.y, 5, 0, Math.PI * 2);
        ctx.fill();
    }

    if (gameOver) {
        ctx.fillStyle = 'rgba(0,0,0,0.8)';
        ctx.fillRect(0, 0, cvs.width, cvs.height);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 30px sans-serif';
        ctx.textAlign = 'center';
        const win = p1.hp > 0 && !p1.isFallen ? 'P1 승리!' : 'P2 승리!';
        ctx.fillText(`🏆 ${win}`, cvs.width / 2, cvs.height / 2);
    }
}

function loop() {
    update();
    render();
    requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
